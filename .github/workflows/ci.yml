name: Lint, Test, Build

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Changelog Gate
        if: github.event_name == 'pull_request'
        run: node scripts/check-changelog-gate.mjs "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc -p tsconfig.app.json --noEmit && npx tsc -p tsconfig.spec.json --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: timeout 20m npm run build:ci
